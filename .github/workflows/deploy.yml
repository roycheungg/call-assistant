name: Deploy to Hetzner VPS

on:
  push:
    branches: [master]

jobs:
  # Fail fast on type / lint / build errors before touching the VPS.
  # Deploy only runs if this job is green.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo bash /home/kaia/deploy-hooks/deploy-call-assistant.sh
            echo "==> Deploy complete!"
